<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Güvenlik Raporu - Güvenlimi?</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <span class="shield">🛡️</span> güvenlimi<span class="brand-dot">?</span>
  </a>
  <ul class="navbar-links">
    <li><a href="dashboard.html">Tarama</a></li>
    <li><a href="pricing.html">Hak Satın Al</a></li>
  </ul>
  <div class="navbar-actions">
    <a href="dashboard.html" class="btn-outline-nav">← Yeni Tarama</a>
    <button onclick="logout()" class="btn-nav">Çıkış</button>
  </div>
</nav>

<div class="report-page">

  <!-- Loading State -->
  <div id="loadingState" style="display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:1rem;">
    <div style="width:60px;height:60px;border-radius:50%;border:4px solid var(--border);border-top-color:var(--primary);animation:spin 0.8s linear infinite;"></div>
    <p style="font-weight:600;color:var(--primary);">Rapor yükleniyor...</p>
  </div>

  <!-- Report Content -->
  <div id="reportContent" style="display:none;">
    <!-- Report Header -->
    <div class="report-header">
      <div style="display:flex;align-items:center;gap:2rem;flex-wrap:wrap;">
        <div class="score-circle" id="scoreCircle">
          <div class="score-inner">
            <span class="score-num" id="scoreNum">-</span>
            <span class="score-label">/ 100</span>
          </div>
        </div>
        <div>
          <div style="font-size:0.85rem;color:rgba(255,255,255,0.7);margin-bottom:0.3rem;">Analiz Edilen Site</div>
          <h1 id="reportDomain" style="font-size:1.8rem;font-weight:800;color:white;"></h1>
          <p id="reportSummary" style="color:rgba(255,255,255,0.8);margin-top:0.5rem;max-width:500px;"></p>
          <div style="margin-top:0.8rem;display:flex;gap:8px;align-items:center;">
            <span id="reportScore" style="padding:4px 14px;border-radius:50px;font-size:0.85rem;font-weight:700;"></span>
            <span style="font-size:0.8rem;color:rgba(255,255,255,0.6);" id="reportDate"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Report Body -->
    <div style="padding:2rem 5%;">

      <!-- Stats -->
      <div class="report-stat-grid">
        <div class="report-stat danger">
          <span class="num" id="critCount">0</span>
          <span class="lbl">🔴 Kritik Sorun</span>
        </div>
        <div class="report-stat warning">
          <span class="num" id="warnCount">0</span>
          <span class="lbl">🟡 Uyarı</span>
        </div>
        <div class="report-stat success">
          <span class="num" id="passCount">0</span>
          <span class="lbl">🟢 Geçen Kontrol</span>
        </div>
      </div>

      <!-- Checks -->
      <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:1.2rem;">📋 Güvenlik Kontrolleri</h2>
      <div id="checksList"></div>

      <!-- Actions -->
      <div style="display:flex;gap:12px;margin-top:2rem;flex-wrap:wrap;">
        <a href="dashboard.html" class="btn btn-primary">🔍 Yeni Tarama</a>
        <button onclick="window.print()" class="btn btn-outline">🖨️ Raporu Yazdır</button>
        <a href="pricing.html" class="btn btn-outline" style="border-color:var(--success);color:var(--success);">⚡ Daha Fazla Hak Al</a>
      </div>
    </div>
  </div>

  <!-- Error State -->
  <div id="errorState" style="display:none;text-align:center;padding:5rem 2rem;">
    <div style="font-size:3rem;">❌</div>
    <h2 style="margin:1rem 0 0.5rem;">Rapor Bulunamadı</h2>
    <p style="color:var(--text-muted);">Bu rapor mevcut değil veya size ait değil.</p>
    <a href="dashboard.html" class="btn btn-primary" style="margin-top:1.5rem;">← Dashboard'a Dön</a>
  </div>

</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

const params = new URLSearchParams(window.location.search);
const scanId = params.get('id');

async function loadReport() {
  if (!scanId) { showError(); return; }
  try {
    const res = await fetch(`/api/scan/${scanId}`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!res.ok) { showError(); return; }
    const data = await res.json();
    renderReport(data);
  } catch { showError(); }
}

function showError() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
}

function renderReport(data) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('reportContent').style.display = 'block';

  const r = data.report;
  const score = r.score || 0;

  // Score circle color by grade
  let color = score >= 80 ? '#00e676' : score >= 60 ? '#ffbb33' : '#ff3547';
  let label = score >= 80 ? 'İyi' : score >= 60 ? 'Orta' : 'Kötü';
  let deg = (score / 100) * 360;

  document.getElementById('scoreCircle').style.background =
    `conic-gradient(${color} ${deg}deg, rgba(255,255,255,0.15) 0deg)`;
  document.getElementById('scoreNum').textContent = score;

  document.getElementById('reportDomain').textContent = r.domain || new URL(data.url).hostname;
  document.getElementById('reportSummary').textContent = r.summary || '';
  document.getElementById('reportDate').textContent = '📅 ' + new Date(data.created_at).toLocaleString('tr-TR');

  const scoreBadge = document.getElementById('reportScore');
  scoreBadge.textContent = label;
  scoreBadge.style.background = color + '33';
  scoreBadge.style.color = color;
  scoreBadge.style.border = `1px solid ${color}55`;

  document.getElementById('critCount').textContent = r.criticalIssues || 0;
  document.getElementById('warnCount').textContent = r.warnings || 0;
  document.getElementById('passCount').textContent = r.passed || 0;

  const list = document.getElementById('checksList');
  if (r.checks && r.checks.length > 0) {
    r.checks.forEach(c => {
      const status = (c.status || '').toLowerCase();
      const icons = { güvenli: '✅', riskli: '❌', uyarı: '⚠️' };
      const icon = icons[status] || '❓';
      const el = document.createElement('div');
      el.className = `check-item ${status}`;
      el.innerHTML = `
        <span class="check-status-icon">${icon}</span>
        <div style="flex:1;">
          <div class="check-title">${c.category || 'Kontrol'}</div>
          <div class="check-desc">${c.description || ''}</div>
          ${c.recommendation ? `<div class="check-rec">💡 ${c.recommendation}</div>` : ''}
        </div>
      `;
      list.appendChild(el);
    });
  } else {
    list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;">Kontrol detayları bulunamadı</p>';
  }
}

function logout() { localStorage.clear(); window.location.href = 'index.html'; }

loadReport();
</script>
</body>
</html>
