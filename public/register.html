<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kayıt Ol - Güvenlimi?</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="shield-sm">🛡️</span>
      güvenlimi<span style="color:var(--text)">?</span>
    </div>
    <h1 class="auth-title">Hesap Oluştur</h1>
    <p class="auth-sub">Günde 1 ücretsiz tarama hakkı ile başla</p>

    <div class="alert alert-error" id="alertErr">⚠️ <span id="errMsg"></span></div>
    <div class="alert alert-success" id="alertOk">✅ <span id="okMsg"></span></div>

    <form id="registerForm">
      <div class="form-group">
        <label>Ad Soyad</label>
        <div class="form-input-icon">
          <span class="icon">👤</span>
          <input type="text" id="name" placeholder="Adınızı girin" required/>
        </div>
      </div>
      <div class="form-group">
        <label>E-posta Adresi</label>
        <div class="form-input-icon">
          <span class="icon">✉️</span>
          <input type="email" id="email" placeholder="ornek@email.com" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <div class="form-input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="password" placeholder="En az 6 karakter" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Şifre Tekrar</label>
        <div class="form-input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="password2" placeholder="Şifrenizi tekrar girin" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
        🚀 Hesap Oluştur
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted);font-size:0.9rem;">
      Zaten hesabın var mı? <a href="login.html" style="color:var(--primary);font-weight:600;">Giriş Yap</a>
    </p>
  </div>
</div>

<script>
const form = document.getElementById('registerForm');
const alertErr = document.getElementById('alertErr');
const alertOk = document.getElementById('alertOk');
const errMsg = document.getElementById('errMsg');
const okMsg = document.getElementById('okMsg');
const submitBtn = document.getElementById('submitBtn');

function showErr(msg) {
  errMsg.textContent = msg;
  alertErr.classList.add('show');
  alertOk.classList.remove('show');
}
function showOk(msg) {
  okMsg.textContent = msg;
  alertOk.classList.add('show');
  alertErr.classList.remove('show');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  if (pw !== pw2) return showErr('Şifreler eşleşmiyor');

  submitBtn.disabled = true;
  submitBtn.textContent = 'Kayıt yapılıyor...';

  try {
    const res = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password: pw })
    });
    const data = await res.json();
    if (!res.ok) return showErr(data.error);
    localStorage.setItem('token', data.token);
    showOk('Kayıt başarılı! Yönlendiriliyorsunuz...');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  } catch {
    showErr('Sunucu hatası. Lütfen tekrar deneyin.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '🚀 Hesap Oluştur';
  }
});
</script>
</body>
</html>
